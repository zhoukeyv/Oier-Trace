<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIerDb 查询工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>OIerDb 查询工具</h1>
            <p>信息学奥赛选手数据模糊查询</p>
        </div>

        <div class="content">
            <div id="loadingIndicator" class="loading">
                <p>正在加载数据，请稍候...</p>
            </div>

            <div id="mainContent" class="hidden">
                <!-- 步骤1: 添加奖项条件 -->
                <div class="section">
                    <div class="section-title">奖项条件</div>
                    <div class="section-content">
                        <div class="form-group">
                            <label>搜索比赛（如: CSP2023, NOI2022, APIO）</label>
                            <input type="text" id="contestSearch" placeholder="输入比赛关键字">
                            <div id="contestResults" class="search-results hidden"></div>
                        </div>

                        <div id="selectedContestInfo" class="hidden">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>选择奖项等级</label>
                                    <select id="awardSelect">
                                        <!-- 通过JS动态填充 -->
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label>精确分数</label>
                                    <input type="number" id="scoreInput" placeholder="留空表示不限制分数" step="0.01">
                                </div>
                            </div>

                            <button id="addConditionBtn">添加奖项条件</button>
                        </div>

                        <div id="conditionsList" style="margin-top: 20px;">
                            <div class="notice">
                                <span class="notice-icon" aria-hidden="true">i</span>
                                <div class="notice-text">暂未添加任何奖项条件</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 网格布局区域：步骤2-5 -->
                <div class="sections-grid">
                    <!-- 步骤2: 选择省份 -->
                    <div class="section">
                        <div class="section-title">省份</div>
                        <div class="section-content">
                            <div class="checkbox-group">
                                <input type="checkbox" id="useProvince">
                                <label for="useProvince" style="margin: 0;">按省份筛选</label>
                            </div>

                            <div id="provinceSection" class="hidden">
                                <div class="form-group">
                                    <label>搜索省份</label>
                                    <input type="text" id="provinceSearch" placeholder="输入省份关键字（如: 浙江, 北京）">
                                    <div id="provinceResults" class="search-results hidden"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 步骤3: 选择学校 -->
                    <div class="section">
                        <div class="section-title">学校</div>
                        <div class="section-content">
                            <div class="checkbox-group">
                                <input type="checkbox" id="useSchool">
                                <label for="useSchool" style="margin: 0;">按学校筛选</label>
                            </div>

                            <div id="schoolSection" class="hidden">
                                <div class="form-group">
                                    <label>搜索学校（名称/省份/城市）</label>
                                    <input type="text" id="schoolSearch" placeholder="输入学校关键字（如: 杭州二中, 清华附中）">
                                    <div id="schoolResults" class="search-results hidden"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 步骤4: 选择年级或年级范围 -->
                    <div class="section">
                        <div class="section-title">年级或年级范围</div>
                        <div class="section-content">
                            <div class="checkbox-group">
                                <input type="checkbox" id="useGrade">
                                <label for="useGrade" style="margin: 0;">按年级筛选</label>
                            </div>

                            <div id="gradeSection" class="hidden">
                                <div class="form-group">
                                    <label>筛选模式</label>
                                    <select id="gradeMode">
                                        <option value="single">单个年级</option>
                                        <option value="range">年级范围</option>
                                    </select>
                                </div>

                                <div id="singleGradeSection">
                                    <div class="form-group">
                                        <label>入学年份</label>
                                        <input type="number" id="singleGradeInput" placeholder="如: 2019" min="2000" max="2030">
                                    </div>
                                </div>

                                <div id="rangeGradeSection" class="hidden">
                                    <div class="form-row">
                                        <div class="form-group">
                                            <label>起始年份</label>
                                            <input type="number" id="gradeStartInput" placeholder="如: 2018" min="2000" max="2030">
                                        </div>
                                        <div class="form-group">
                                            <label>结束年份</label>
                                            <input type="number" id="gradeEndInput" placeholder="如: 2020" min="2000" max="2030">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 步骤5: 输入姓名简称 -->
                    <div class="section">
                        <div class="section-title">姓名简称</div>
                        <div class="section-content">
                            <div class="checkbox-group">
                                <input type="checkbox" id="useName">
                                <label for="useName" style="margin: 0;">按姓名简称筛选</label>
                            </div>

                            <div id="nameSection" class="hidden">
                                <div class="form-group">
                                    <label>姓名简称</label>
                                    <input type="text" id="nameInput" placeholder="如: zxw, lhx">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 网格布局区域结束 -->

                <!-- 查询按钮 -->
                <button id="queryBtn" style="font-size: 1em; padding: 12px;">开始查询</button>

                <!-- 结果显示区域 -->
                <div id="resultsContainer" class="results-container hidden"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p>本项目仅供学习交流使用</p>
            <p>数据来源: <a href="https://github.com/OIerDb-ng/OIerDb-data-generator" target="_blank" rel="noopener noreferrer">OIerDb-data-generator</a>&nbsp; Made with  💖  by Baoshuo, Menci, nocriz and yhx-12243</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
